server.port=8080
spring.application.name=ewm-main-service

spring.datasource.url=jdbc:postgresql://localhost:5432/ewm-db
spring.datasource.username=stats
spring.datasource.password=stats
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

stats-server.url=${STATS_SERVER_URL:http://localhost:9090}
spring.jpa.properties.hibernate.default_batch_fetch_size=20

spring.jackson.serialization.write-dates-as-timestamps=false

management.endpoints.web.exposure.include=health,info
